<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ダッシュボード | OshiLink</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div class="logo"><a href="index.html">OshiLink</a></div>
      <nav>
        <a href="index.html">トップ</a>
        <a href="events.html">ライブ一覧</a>
        <a href="plans.html">料金プラン</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <p class="section-label">DASHBOARD</p>
          <h2>マイページ</h2>
        </div>
      </div>

      <div class="card" style="margin-bottom: 24px;">
        <div class="card-body">
          <h3>ユーザー情報</h3>
          <p id="userEmail">読み込み中...</p>
          <p id="userPlan">プラン確認中...</p>
          <p id="registeredArtistName" style="margin-top: 8px; color: #d7c2ff;">演者情報を確認中...</p>
          <div style="margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap;">
            <a href="plans.html" class="primary-btn">プランを見る</a>
            <button id="logoutBtn" class="ghost-btn" type="button">ログアウト</button>
          </div>
        </div>
      </div>

      <div class="card" id="artistRequiredNotice" style="margin-bottom: 24px; display: none;">
        <div class="card-body">
          <h3>先に演者登録を行ってください</h3>
          <p class="helper-text">
            OshiLinkでは、演者登録がアカウント情報の代わりになります。<br>
            まだ演者情報が未登録のため、イベント投稿は演者登録完了後に利用できます。
          </p>
        </div>
      </div>

      <div class="card" style="margin-bottom: 24px;">
        <div class="card-body">
          <h3>演者登録</h3>

          <form id="artistForm" style="display: grid; gap: 12px;">
            <input type="text" id="artistName" placeholder="演者名" required />
            <input type="text" id="artistDescription" placeholder="説明" />
            <input type="text" id="artistXUrl" placeholder="XのURL" />
            <input type="text" id="artistDetailSlug" placeholder="詳細URL用slug（有料プランのみ）" />
            <label>
              演者アイコン
              <input type="file" id="artistIcon" accept="image/*" />
            </label>

            <button type="submit" class="primary-btn">演者を登録する</button>
          </form>

          <p id="artistMessage" style="margin-top: 12px;"></p>
        </div>
      </div>

      <div class="card" id="eventCard" style="margin-bottom: 24px;">
        <div class="card-body">
          <h3>イベント投稿</h3>

          <form id="eventForm" style="display: grid; gap: 12px;">
            <input type="text" id="title" placeholder="タイトル" required />

            <select id="area" required>
              <option value="">地域を選択してください</option>
              <option value="北海道">北海道</option>
              <option value="青森">青森</option>
              <option value="岩手">岩手</option>
              <option value="宮城">宮城</option>
              <option value="秋田">秋田</option>
              <option value="山形">山形</option>
              <option value="福島">福島</option>
              <option value="茨城">茨城</option>
              <option value="栃木">栃木</option>
              <option value="群馬">群馬</option>
              <option value="埼玉">埼玉</option>
              <option value="千葉">千葉</option>
              <option value="東京">東京</option>
              <option value="神奈川">神奈川</option>
              <option value="新潟">新潟</option>
              <option value="富山">富山</option>
              <option value="石川">石川</option>
              <option value="福井">福井</option>
              <option value="山梨">山梨</option>
              <option value="長野">長野</option>
              <option value="岐阜">岐阜</option>
              <option value="静岡">静岡</option>
              <option value="愛知">愛知</option>
              <option value="三重">三重</option>
              <option value="滋賀">滋賀</option>
              <option value="京都">京都</option>
              <option value="大阪">大阪</option>
              <option value="兵庫">兵庫</option>
              <option value="奈良">奈良</option>
              <option value="和歌山">和歌山</option>
              <option value="鳥取">鳥取</option>
              <option value="島根">島根</option>
              <option value="岡山">岡山</option>
              <option value="広島">広島</option>
              <option value="山口">山口</option>
              <option value="徳島">徳島</option>
              <option value="香川">香川</option>
              <option value="愛媛">愛媛</option>
              <option value="高知">高知</option>
              <option value="福岡">福岡</option>
              <option value="佐賀">佐賀</option>
              <option value="長崎">長崎</option>
              <option value="熊本">熊本</option>
              <option value="大分">大分</option>
              <option value="宮崎">宮崎</option>
              <option value="鹿児島">鹿児島</option>
              <option value="沖縄">沖縄</option>
            </select>

            <input type="text" id="place" placeholder="場所" required />
            <input type="date" id="date" required />

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <div style="display: grid; gap: 8px;">
                <label>OPEN</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                  <select id="openHour" required></select>
                  <select id="openMinute" required></select>
                </div>
              </div>

              <div style="display: grid; gap: 8px;">
                <label>START</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                  <select id="startHour" required></select>
                  <select id="startMinute" required></select>
                </div>
              </div>
            </div>

            <input type="text" id="price" placeholder="料金" />

            <input type="text" id="detailUrl" placeholder="詳細URL（有料プランのみ）" />
            <input type="text" id="ticketUrl" placeholder="チケットURL（有料プランのみ）" />

            <label>
              イベント画像
              <input type="file" id="eventImage" accept="image/*" />
            </label>

            <button type="submit" class="primary-btn">イベントを投稿する</button>
          </form>

          <p id="eventMessage" style="margin-top: 12px;"></p>
        </div>
      </div>

      <div class="card" style="margin-bottom: 24px;">
        <div class="card-body">
          <h3>動画投稿</h3>

          <form id="videoForm" style="display: grid; gap: 12px;">
            <input type="text" id="videoTitle" placeholder="動画タイトル" required />
            <input type="text" id="videoArtist" placeholder="演者名" required />
            <input type="text" id="videoType" placeholder="種別（例：歌ってみた）" />
            <input type="text" id="videoDescription" placeholder="説明" />
            <input type="text" id="videoUrl" placeholder="動画URL" />

            <button type="submit" class="primary-btn">動画を投稿する</button>
          </form>

          <p id="videoMessage" style="margin-top: 12px;"></p>
        </div>
      </div>

      <div class="section-head">
        <h3>投稿したイベント</h3>
      </div>
      <div id="myEvents" class="card-grid" style="margin-bottom: 32px;"></div>

      <div class="section-head">
        <h3>登録した演者</h3>
      </div>
      <div id="myArtists" class="card-grid" style="margin-bottom: 32px;"></div>

      <div class="section-head">
        <h3>投稿した動画</h3>
      </div>
      <div id="myVideos" class="card-grid"></div>
    </div>
  </main>

  <script type="module" src="dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>料金プラン | OshiLink</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container nav">
      <div class="logo"><a href="index.html">OshiLink</a></div>
      <nav>
        <a href="index.html">トップ</a>
        <a href="events.html">ライブ一覧</a>
        <a href="login.html">ログイン</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">

      <div class="section-head">
        <div>
          <p class="section-label">PLAN</p>
          <h2>料金プラン</h2>
        </div>
      </div>

      <div class="card-grid">

        <div class="card plan-card-layout" id="planCardFree">
          <div class="card-body">
            <h3>FREE</h3>
            <p style="font-size: 1.8rem; font-weight: 800;">¥0<span style="font-size: 0.9rem;"> / 月</span></p>

            <ul style="margin-top: 16px; line-height: 1.8;">
              <li>イベント掲載：3件まで</li>
              <li>動画掲載：3件まで</li>
              <li>演者登録：1件</li>
              <li>通常表示</li>
            </ul>

            <div id="planActionFree" class="plan-action">
              <button class="ghost-btn">FREE</button>
            </div>
          </div>
        </div>

        <div class="card plan-card-layout" id="planCardStandard">
          <div class="card-body">
            <h3>STANDARD</h3>
            <p style="font-size: 1.8rem; font-weight: 800;">¥980<span style="font-size: 0.9rem;"> / 月</span></p>

            <ul style="margin-top: 16px; line-height: 1.8;">
              <li>イベント・動画 無制限</li>
              <li>演者登録：3件</li>
              <li>プロフィール強化</li>
              <li>軽い優先表示</li>
              <li>簡易分析</li>
            </ul>

            <div id="planActionStandard" class="plan-action">
              <button id="btnStandard" class="primary-btn">STANDARDにする</button>
            </div>
          </div>
        </div>

        <div class="card plan-card-layout" id="planCardPremium">
          <div class="card-body">
            <h3>PREMIUM</h3>
            <p style="font-size: 1.8rem; font-weight: 800;">¥2,980<span style="font-size: 0.9rem;"> / 月</span></p>

            <ul style="margin-top: 16px; line-height: 1.8;">
              <li>すべて無制限</li>
              <li>最優先表示</li>
              <li>演者ページ強化</li>
              <li>詳細分析</li>
              <li>優先掲載</li>
            </ul>

            <div id="planActionPremium" class="plan-action">
              <button id="btnPremium" class="primary-btn">PREMIUMにする</button>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 OshiLink</p>
      <p>推し活がもっと楽になる場所</p>
    </div>
  </footer>

 <script type="module">
  import { supabase } from "./supabase.js";

  let currentPlan = "free";

  function setCurrentPlanUI(plan) {
    currentPlan = plan || "free";

    const cardMap = {
      free: document.getElementById("planCardFree"),
      standard: document.getElementById("planCardStandard"),
      premium: document.getElementById("planCardPremium")
    };

    Object.values(cardMap).forEach(card => {
      card?.classList.remove("plan-card-active");
    });

    cardMap[currentPlan]?.classList.add("plan-card-active");

    const actions = {
      free: document.getElementById("planActionFree"),
      standard: document.getElementById("planActionStandard"),
      premium: document.getElementById("planActionPremium")
    };

    actions.free.innerHTML = `
      <button class="ghost-btn ${currentPlan === "free" ? "plan-current-btn" : ""}">
        ${currentPlan === "free" ? "利用中" : "FREE"}
      </button>
    `;

    if (currentPlan === "standard") {
      actions.standard.innerHTML = `<button class="ghost-btn plan-current-btn">利用中</button>`;
      actions.premium.innerHTML = `<button id="btnPremium" class="primary-btn">PREMIUMに変更する</button>`;
    } else if (currentPlan === "premium") {
      actions.standard.innerHTML = `<button id="btnStandard" class="primary-btn">STANDARDに変更する</button>`;
      actions.premium.innerHTML = `<button class="ghost-btn plan-current-btn">利用中</button>`;
    } else {
      actions.standard.innerHTML = `<button id="btnStandard" class="primary-btn">STANDARDにする</button>`;
      actions.premium.innerHTML = `<button id="btnPremium" class="primary-btn">PREMIUMにする</button>`;
    }

    bindPlanButtons();
  }

  async function loadCurrentPlan() {
    try {
      const { data: userData } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        setCurrentPlanUI("free");
        return;
      }

      const { data: profile, error } = await supabase
        .from("profiles")
        .select("plan")
        .eq("id", user.id)
        .single();

      if (error || !profile) {
        setCurrentPlanUI("free");
        return;
      }

      setCurrentPlanUI(profile.plan || "free");
    } catch (error) {
      console.error("プラン状態の取得失敗:", error);
      setCurrentPlanUI("free");
    }
  }

  async function getAccessToken() {
    const { data: sessionData, error: sessionError } = await supabase.auth.getSession();
    if (sessionError) throw sessionError;

    const accessToken = sessionData?.session?.access_token;
    if (!accessToken) {
      alert("決済を行うにはログインが必要です。");
      location.href = "login.html";
      return null;
    }

    return accessToken;
  }

  async function goToCheckout(plan) {
    const accessToken = await getAccessToken();
    if (!accessToken) return;

    try {
      const res = await fetch(
        "https://zoprqzivoqpfylujdaun.supabase.co/functions/v1/create-checkout-session",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${accessToken}`
          },
          body: JSON.stringify({ plan })
        }
      );

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "決済ページの取得に失敗しました");
        return;
      }

      if (data.url) {
        window.location.href = data.url;
      } else {
        alert("決済ページの取得に失敗しました");
      }
    } catch (err) {
      console.error("checkout error:", err);
      alert("エラーが発生しました");
    }
  }

  async function changeSubscription(plan) {
    const accessToken = await getAccessToken();
    if (!accessToken) return;

    try {
      const res = await fetch(
        "https://zoprqzivoqpfylujdaun.supabase.co/functions/v1/change-subscription",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${accessToken}`
          },
          body: JSON.stringify({ plan })
        }
      );

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "プラン変更に失敗しました");
        return;
      }

      alert(data.message || "プランを変更しました。");
      await loadCurrentPlan();
    } catch (err) {
      console.error("change subscription error:", err);
      alert("エラーが発生しました");
    }
  }

  function bindPlanButtons() {
    document.getElementById("btnStandard")?.addEventListener("click", async () => {
      if (currentPlan === "free") {
        await goToCheckout("standard");
      } else {
        await changeSubscription("standard");
      }
    });

    document.getElementById("btnPremium")?.addEventListener("click", async () => {
      if (currentPlan === "free") {
        await goToCheckout("premium");
      } else {
        await changeSubscription("premium");
      }
    });
  }

  loadCurrentPlan();
</script>
</body>
</html>

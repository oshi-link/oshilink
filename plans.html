<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>料金プラン | OshiLink</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container nav">
      <div class="logo"><a href="index.html">OshiLink</a></div>
      <nav>
        <a href="index.html">トップ</a>
        <a href="events.html">ライブ一覧</a>
        <a href="login.html">ログイン</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">

      <div class="section-head">
        <div>
          <p class="section-label">PLAN</p>
          <h2>料金プラン</h2>
        </div>
      </div>

      <div class="card-grid">

        <div class="card plan-card-layout" id="planCardFree">
          <div class="card-body">
            <h3>FREE</h3>
            <p style="font-size: 1.8rem; font-weight: 800;">¥0<span style="font-size: 0.9rem;"> / 月</span></p>

            <ul style="margin-top: 16px; line-height: 1.8;">
              <li>イベント掲載：3件まで</li>
              <li>動画掲載：3件まで</li>
              <li>演者登録：1件</li>
              <li>通常表示</li>
            </ul>

            <div id="planActionFree" class="plan-action">
              <button class="ghost-btn">FREE</button>
            </div>
          </div>
        </div>

        <div class="card plan-card-layout" id="planCardStandard">
          <div class="card-body">
            <h3>STANDARD</h3>
            <p style="font-size: 1.8rem; font-weight: 800;">¥980<span style="font-size: 0.9rem;"> / 月</span></p>

            <ul style="margin-top: 16px; line-height: 1.8;">
              <li>イベント・動画 無制限</li>
              <li>演者登録：3件</li>
              <li>プロフィール強化</li>
              <li>軽い優先表示</li>
              <li>簡易分析</li>
            </ul>

            <div id="planActionStandard" class="plan-action">
              <button class="primary-btn">STANDARDにする</button>
            </div>
          </div>
        </div>

        <div class="card plan-card-layout" id="planCardPremium">
          <div class="card-body">
            <h3>PREMIUM</h3>
            <p style="font-size: 1.8rem; font-weight: 800;">¥2,980<span style="font-size: 0.9rem;"> / 月</span></p>

            <ul style="margin-top: 16px; line-height: 1.8;">
              <li>すべて無制限</li>
              <li>最優先表示</li>
              <li>演者ページ強化</li>
              <li>詳細分析</li>
              <li>優先掲載</li>
            </ul>

            <div id="planActionPremium" class="plan-action">
              <button class="primary-btn">PREMIUMにする</button>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 OshiLink</p>
      <p>推し活がもっと楽になる場所</p>
    </div>
  </footer>

  <script type="module">
    import { supabase } from "./supabase.js";

    async function loadCurrentPlan() {
      try {
        const { data: userData } = await supabase.auth.getUser();
        const user = userData?.user;

        if (!user) return;

        const { data: profile, error } = await supabase
          .from("profiles")
          .select("plan")
          .eq("id", user.id)
          .single();

        if (error || !profile) return;

        const currentPlan = profile.plan || "free";

        const cardMap = {
          free: document.getElementById("planCardFree"),
          standard: document.getElementById("planCardStandard"),
          premium: document.getElementById("planCardPremium")
        };

        cardMap[currentPlan]?.classList.add("plan-card-active");

        const actions = {
          free: document.getElementById("planActionFree"),
          standard: document.getElementById("planActionStandard"),
          premium: document.getElementById("planActionPremium")
        };

        const labels = {
          free: "FREE",
          standard: "STANDARD",
          premium: "PREMIUM"
        };

        Object.entries(actions).forEach(([planKey, el]) => {
          if (!el) return;

          if (planKey === currentPlan) {
            el.innerHTML = `
              <button class="ghost-btn plan-current-btn" style="width: 100%; margin-top: 20px;">
                利用中
              </button>
            `;
          }
        });
      } catch (error) {
        console.error("プラン状態の取得失敗:", error);
      }
    }

    loadCurrentPlan();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | OshiLink</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div class="logo"><a href="index.html">OshiLink</a></div>
      <nav>
        <a href="index.html">トップ</a>
        <a href="plans.html">料金プラン</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container" style="max-width: 520px;">
      <div class="section-head">
        <div>
          <p class="section-label">LOGIN</p>
          <h2>ログイン / 新規登録</h2>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <form id="loginForm" style="display: grid; gap: 14px;">
            <input
              type="email"
              id="email"
              placeholder="メールアドレス"
              required
              style="width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem; outline: none;"
            />

            <input
              type="password"
              id="password"
              placeholder="パスワード"
              required
              style="width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem; outline: none;"
            />

            <button type="submit" class="primary-btn" style="width: 100%;">
              ログイン
            </button>
          </form>

          <hr style="margin: 24px 0; opacity: 0.15;" />

          <a
            href="signup.html"
            class="ghost-btn"
            style="width: 100%; cursor: pointer; display: inline-block; text-align: center;"
          >
            新規登録
          </a>

          <p id="message" style="margin-top: 16px; color: #d7c2ff;"></p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>

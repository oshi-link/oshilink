<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OshiLink | 推しの“今”が全部わかる</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="container nav">
      <div class="logo">OshiLink</div>

      <nav>
        <a href="#today">ライブ情報</a>
        <a href="#videos">新着動画</a>
        <a href="#artists">演者一覧</a>
      </nav>

      <div class="nav-right" id="authNav">
        <a href="login.html" class="nav-cta">ログイン</a>
      </div>
    </div>
  </header>

  <main>

    <!-- ヒーロー -->
    <section class="hero">
      <div class="container hero-inner">
        <p class="eyebrow">歌い手告知まとめサイト</p>
        <h1>推しの“今”が<br>全部わかる</h1>
        <p class="hero-text">
          ライブ情報も、歌ってみたも、配信告知も。<br>
          散らばった宣伝情報をひとつにまとめるポータルサイト。
        </p>

        <div class="search-box">
          <input id="searchInput" type="text" placeholder="アーティスト名 / 地域 / 会場で検索" />
          <button id="searchButton">検索</button>
        </div>

        <div class="quick-filters">
          <button class="filter-btn active" data-filter="all">すべて</button>
          <button class="filter-btn" data-filter="東京">東京</button>
          <button class="filter-btn" data-filter="名古屋">名古屋</button>
          <button class="filter-btn" data-filter="大阪">大阪</button>
        </div>
      </div>
    </section>

    <!-- ライブ情報 -->
    <section id="today" class="section">
      <div class="container">
        <div class="section-head">
          <div>
            <p class="section-label">LIVE</p>
            <h2>ライブ情報</h2>
          </div>
          <a href="events.html" class="text-link">一覧を見る</a>
        </div>

        <div id="eventGrid" class="card-grid"></div>
      </div>
    </section>

    <!-- 動画 -->
    <section id="videos" class="section alt">
      <div class="container">
        <div class="section-head">
          <div>
            <p class="section-label">MOVIE</p>
            <h2>新着動画</h2>
          </div>
        </div>

        <div id="videoGrid" class="card-grid video-grid"></div>
      </div>
    </section>

    <!-- 演者一覧 -->
    <section id="artists" class="section alt">
      <div class="container">
        <div class="section-head">
          <div>
            <p class="section-label">ARTISTS</p>
            <h2>演者一覧</h2>
          </div>
        </div>

        <div id="artistGrid" class="artist-list"></div>
      </div>
    </section>

    <!-- CTA -->
    <section class="section cta-section">
      <div class="container cta-box">
        <div>
          <p class="section-label">START</p>
          <h2>あなたも掲載してみませんか？</h2>
          <p>ログインするとイベントや動画を投稿できます。</p>
        </div>
        <a class="primary-btn" href="login.html">ログインする</a>
      </div>
    </section>

  </main>

  <!-- フッター -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 OshiLink</p>
      <p>推し活がもっと楽になる場所</p>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
